name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Verify production build
        run: |
          grep -q '/Demo/assets/' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html
          test -f dist/404.html

      - name: Password-protect HTML
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          set -euo pipefail

          # Fail loudly if the secret is missing/empty — otherwise staticrypt would
          # encrypt with an empty password and ANYONE could click through with a blank field.
          if [ -z "${STATICRYPT_PASSWORD:-}" ]; then
            echo "::error::SITE_PASSWORD secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Fixed salt so every build produces the same hash (stable across deploys).
          SALT="a90894c8f2a30af9e7ebd8a60e7bfcd4"

          # Pass the password explicitly (env-var auto-pickup prompts in CI) and read stdin
          # from /dev/null so staticrypt can never block on an interactive prompt.
          # staticrypt flattens output to <basename> inside the -d dir; move back over the originals.
          npx staticrypt dist/index.html --password "$STATICRYPT_PASSWORD" -d /tmp/staticrypt-out/ -s "$SALT" --remember false --short < /dev/null
          npx staticrypt dist/404.html   --password "$STATICRYPT_PASSWORD" -d /tmp/staticrypt-out/ -s "$SALT" --remember false --short < /dev/null
          mv /tmp/staticrypt-out/index.html dist/index.html
          mv /tmp/staticrypt-out/404.html   dist/404.html

          # Verify the encryption actually applied (staticrypt marks the html element).
          grep -q 'staticrypt' dist/index.html
          grep -q 'staticrypt' dist/404.html

      # Matches upload-pages-artifact output (artifact name: github-pages) without that composite action.
      - name: Package Pages artifact
        run: |
          tar --dereference --hard-dereference \
            --directory dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude='.[^/]*' \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
