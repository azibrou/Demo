name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Push built `dist/` to the gh-pages branch (no deploy-pages / upload-pages-artifact).
permissions:
  contents: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify production build
        run: |
          grep -q '/Demo/assets/' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html
          test -f dist/404.html

      - name: Publish dist to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir=$(mktemp -d)
          cp -r dist/. "$workdir/"
          touch "$workdir/.nojekyll"

          cd "$workdir"
          git init -b gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
